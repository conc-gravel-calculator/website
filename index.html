<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Free Concrete & Gravel Calculator | Bag & Ton Estimator</title>
    <meta name="description" content="Calculate exactly how many 60lb/80lb concrete bags or tons of gravel you need for your project. Perfect mobile tool for contractors and DIY home improvement.">
    <meta name="keywords" content="concrete calculator, gravel calculator, cubic yards estimator, how many concrete bags, gravel tons calculator, yardage calculator">

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="toggle-container" style="display: flex; justify-content: flex-end; align-items: center; max-width: 500px; margin: 15px auto; padding: 0 20px; width: 100%; box-sizing: border-box;">
        <span class="toggle-text" style="margin-right: 10px; font-weight: bold;">Dark Mode</span>
        <label class="switch" style="position: relative; display: inline-block; width: 50px; height: 26px;">
            <input type="checkbox" id="darkModeToggle" style="opacity: 0; width: 0; height: 0;">
            <span class="slider round" style="position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 34px;"></span>
        </label>
    </div>

    <div class="calculator-container" style="margin-top: 10px;">
        <h1>Material Calculator</h1>
        
        <div class="tabs">
            <button class="tab-btn active" data-type="concrete">Concrete</button>
            <button class="tab-btn" data-type="gravel">Gravel</button>
        </div>

        <div class="input-group">
            <label for="length">Length (Feet)</label>
            <input type="number" id="length" placeholder="Enter length in feet" min="0" step="any">
        </div>

        <div class="input-group">
            <label for="width">Width (Feet)</label>
            <input type="number" id="width" placeholder="Enter width in feet" min="0" step="any">
        </div>

        <div class="input-group">
            <label for="depth">Thickness / Depth (Inches)</label>
            <input type="number" id="depth" placeholder="Enter thickness in inches" min="0" step="any">
        </div>

        <div class="checkbox-group">
            <input type="checkbox" id="buffer">
            <label for="buffer">Include 10% extra material (Recommended)</label>
        </div>

        <button id="calculateBtn" class="calc-btn">Calculate Total</button>

        <div id="results" class="results-box hidden">
            <h2>Calculation Results</h2>
            <p><strong>Total Volume:</strong> <span id="volumeResult">0</span> Cubic Yards</p>
            
            <div id="concreteResults">
                <p><strong>60 lb Bags Required:</strong> <span id="bags60Result">0</span></p>
                <p><strong>80 lb Bags Required:</strong> <span id="bags80Result">0</span></p>
            </div>

            <div id="gravelResults" class="hidden">
                <p><strong>Total Weight Needed:</strong> <span id="tonsResult">0</span> Tons</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
<script async="async" data-cfasync="false" src="https://pl29775218.effectivecpmnetwork.com/53ffeea0287b7f701be96d58190c6c7d/invoke.js"></script>
<div id="container-53ffeea0287b7f701be96d58190c6c7d"></div>

</body>
</html>
