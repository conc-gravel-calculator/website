<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Easy Concrete & Gravel Calculator</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <div class="app-container">

        <!-- Header -->
        <header class="header">
            <h1>Easy Concrete & Gravel Calculator</h1>

            <div class="theme-switch">
                <span>☀️</span>
                <label class="switch">
                    <input type="checkbox" id="darkModeToggle">
                    <span class="slider"></span>
                </label>
                <span>🌙</span>
            </div>
        </header>

        <!-- Material Tabs -->
        <div class="tabs">
            <button class="tab-btn active" data-type="concrete">
                Concrete
            </button>
            <button class="tab-btn" data-type="gravel">
                Gravel
            </button>
        </div>

        <!-- Input Card -->
        <div class="card">
            <div class="input-group">
                <label for="length">Length (feet)</label>
                <input
                    type="number"
                    id="length"
                    placeholder="Enter length"
                    min="0"
                    step="0.01"
                >
            </div>

            <div class="input-group">
                <label for="width">Width (feet)</label>
                <input
                    type="number"
                    id="width"
                    placeholder="Enter width"
                    min="0"
                    step="0.01"
                >
            </div>

            <div class="input-group">
                <label for="depth">Thickness / Depth (inches)</label>
                <input
                    type="number"
                    id="depth"
                    placeholder="Enter depth"
                    min="0"
                    step="0.01"
                >
            </div>

            <div class="checkbox-container">
                <input type="checkbox" id="buffer">
                <label for="buffer">
                    Include 10% safety buffer (recommended)
                </label>
            </div>

            <button id="calculateBtn" class="calculate-btn">
                Calculate Materials
            </button>
        </div>

        <!-- Results -->
        <div id="results" class="results hidden">
            <h2>Results</h2>

            <div class="result-item">
                <span>Total Cubic Yards</span>
                <strong id="volumeResult">0</strong>
            </div>

            <div id="concreteResults">
                <div class="result-item">
                    <span>60 lb Bags Required</span>
                    <strong id="bags60Result">0</strong>
                </div>

                <div class="result-item">
                    <span>80 lb Bags Required</span>
                    <strong id="bags80Result">0</strong>
                </div>
            </div>

            <div id="gravelResults" class="hidden">
                <div class="result-item">
                    <span>Total Weight (Tons)</span>
                    <strong id="tonsResult">0</strong>
                </div>
            </div>
        </div>

    </div>

    <!-- ===================================================== -->
    <!-- ADMOB BANNER PLACEHOLDER                              -->
    <!-- Paste your Google AdMob Banner Ad code here later     -->
    <!-- This area stays fixed at the bottom of the screen     -->
    <!-- ===================================================== -->
    <div id="admob-banner-placeholder">
        <!-- AdMob Banner Code Goes Here -->
    </div>

    <script src="script.js"></script>
</body>
</html>
